name: Sync anvi'o help pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Check out anvio.org
      uses: actions/checkout@v4

    - name: Clone anvi'o repository
      run: git clone https://github.com/merenlab/anvio.git anvio_source

    - name: Set up conda environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniconda-version: 'latest'
        auto-update-conda: true
        activate-environment: anvio_env
        environment-file: anvio_source/.conda/environment.yaml
        python-version: "3.10"

    - name: Install anvi'o from source
      shell: bash -l {0}
      run: pip install -e anvio_source

    - name: Re-populate people data
      shell: bash -l {0}
      run: |
        cat anvio_source/anvio/data/misc/PEOPLE/DEVELOPERS.yaml > _data/people.yaml
        echo "" >> _data/people.yaml
        cat anvio_source/anvio/data/misc/PEOPLE/CONTRIBUTORS.yaml >> _data/people.yaml
        cp anvio_source/anvio/data/misc/PEOPLE/AVATARS/* images/avatars/
        python _scripts/generate-github-contributions-data.py
        cp _data/contributor-stats.json people/contributor-stats.json
        python _scripts/update-people-dir.py
        python _scripts/update-programs-info.py --quiet

    - name: Re-populate tags
      shell: bash -l {0}
      run: python _scripts/populate-tags.py

    - name: Re-populate help pages
      shell: bash -l {0}
      run: anvi-script-gen-help-pages -o help/main --quiet

    - name: Re-populate programs network
      shell: bash -l {0}
      run: anvi-script-gen-programs-network -o network/network.json --quiet

    - name: Commit and push if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A -- ':!anvio_source'
        git diff --staged --quiet || (git commit -m "sync" && git push)
